syntax = "proto3";

package catalog.v1;

option go_package = "github.com/frishstrike/mercury-backend/api/proto/gen/go/catalog/v1";

import "common/v1/common.proto";
import "google/api/annotations.proto";
import "protoc-gen-openapiv2/options/annotations.proto";

// ─────────────────────────────────────────────────────────────────────────────
// Сервис Catalog
// ─────────────────────────────────────────────────────────────────────────────
service CatalogService {
  // Получить список товаров
  // REST: GET /api/v1/products
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse) {
    option (google.api.http) = {
      get: "/api/v1/products"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "List products"
      description: "Get a paginated list of products"
      tags: ["Products"]
    };
  }

  // Получить товар по ID
  // REST: GET /api/v1/products/{id}
  rpc GetProduct(GetProductRequest) returns (GetProductResponse) {
    option (google.api.http) = {
      get: "/api/v1/products/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Get product"
      description: "Get a product by ID"
      tags: ["Products"]
    };
  }

  // Создать новый товар
  // REST: POST /api/v1/products
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse) {
    option (google.api.http) = {
      post: "/api/v1/products"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Create product"
      description: "Create a new product"
      tags: ["Products"]
    };
  }

  // Обновить товар
  // REST: PUT /api/v1/products/{id}
  rpc UpdateProduct(UpdateProductRequest) returns (UpdateProductResponse) {
    option (google.api.http) = {
      put: "/api/v1/products/{id}"
      body: "*"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Update product"
      description: "Update an existing product"
      tags: ["Products"]
    };
  }

  // Удалить товар
  // REST: DELETE /api/v1/products/{id}
  rpc DeleteProduct(DeleteProductRequest) returns (common.v1.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/products/{id}"
    };
    option (grpc.gateway.protoc_gen_openapiv2.options.openapiv2_operation) = {
      summary: "Delete product"
      description: "Delete a product by ID"
      tags: ["Products"]
    };
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Сообщения
// ─────────────────────────────────────────────────────────────────────────────

message ListProductsRequest {
  // Номер страницы (для REST: query param ?page=1)
  int32 page = 1;
  // Размер страницы (для REST: query param ?page_size=10)
  int32 page_size = 2;
  // Фильтр по категории (для REST: query param ?category=Electronics)
  string category = 3;
  // Только активные товары
  bool only_active = 4;
}

message ListProductsResponse {
  repeated Product products = 1;
  common.v1.Pagination pagination = 2;
}

message GetProductRequest {
  // ID товара в path: /api/v1/products/{id}
  string id = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Product UUID"
    pattern: "^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$"
  }];
}

message GetProductResponse {
  Product product = 1;
}

message CreateProductRequest {
  string name = 1 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Product name"
    min_length: 1
    max_length: 255
  }];
  string description = 2;
  int64 price = 3 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Price in cents"
    minimum: 0
  }];
  int32 stock = 4 [(grpc.gateway.protoc_gen_openapiv2.options.openapiv2_field) = {
    description: "Stock quantity"
    minimum: 0
  }];
  string category = 5;
}

message CreateProductResponse {
  Product product = 1;
}

message UpdateProductRequest {
  string id = 1;
  string name = 2;
  string description = 3;
  int64 price = 4;
  int32 stock = 5;
  string category = 6;
  bool is_active = 7;
}

message UpdateProductResponse {
  Product product = 1;
}

message DeleteProductRequest {
  string id = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// Сущность Product
// ─────────────────────────────────────────────────────────────────────────────
message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  int64 price = 4;
  int32 stock = 5;
  string category = 6;
  bool is_active = 7;
  string created_at = 8;
  string updated_at = 9;
}