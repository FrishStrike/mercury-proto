syntax = "proto3";

package notification.v1;

option go_package = "github.com/FrishStrike/mercury-proto/gen/go/notification/v1";

import "common/v1/common.proto";

// ─────────────────────────────────────────────────────────────────────────────
// Сервис Notification
// ─────────────────────────────────────────────────────────────────────────────
service NotificationService {
  // Отправить email уведомление
  rpc SendEmail(SendEmailRequest) returns (SendEmailResponse);
  // Отправить push уведомление
  rpc SendPush(SendPushRequest) returns (SendPushResponse);
  // Отправить SMS уведомление
  rpc SendSMS(SendSMSRequest) returns (SendSMSResponse);
  // Получить историю уведомлений пользователя
  rpc GetUserNotifications(GetUserNotificationsRequest) returns (GetUserNotificationsResponse);
  // Отметить уведомление как прочитанное
  rpc MarkAsRead(MarkAsReadRequest) returns (common.v1.Empty);
}

// ─────────────────────────────────────────────────────────────────────────────
// Сообщения
// ─────────────────────────────────────────────────────────────────────────────

// Запрос отправки email
message SendEmailRequest {
  // ID пользователя
  string user_id = 1;
  // Email адрес
  string to = 2;
  // Тема письма
  string subject = 3;
  // Тело письма (HTML)
  string body = 4;
  // Тип уведомления
  NotificationType type = 5;
  // Связанный ID заказа (опционально)
  string order_id = 6;
}

// Ответ отправки email
message SendEmailResponse {
  // ID уведомления
  string notification_id = 1;
  // Статус отправки
  string status = 2;
}

// Запрос отправки push
message SendPushRequest {
  // ID пользователя
  string user_id = 1;
  // Заголовок уведомления
  string title = 2;
  // Текст уведомления
  string body = 3;
  // Тип уведомления
  NotificationType type = 4;
  // Связанный ID заказа (опционально)
  string order_id = 5;
  // Дополнительные данные (JSON)
  string data = 6;
}

// Ответ отправки push
message SendPushResponse {
  // ID уведомления
  string notification_id = 1;
  // Статус отправки
  string status = 2;
}

// Запрос отправки SMS
message SendSMSRequest {
  // ID пользователя
  string user_id = 1;
  // Номер телефона
  string phone = 2;
  // Текст сообщения
  string message = 3;
  // Тип уведомления
  NotificationType type = 4;
  // Связанный ID заказа (опционально)
  string order_id = 5;
}

// Ответ отправки SMS
message SendSMSResponse {
  // ID уведомления
  string notification_id = 1;
  // Статус отправки
  string status = 2;
}

// Запрос истории уведомлений
message GetUserNotificationsRequest {
  // ID пользователя
  string user_id = 1;
  // Номер страницы
  int32 page = 2;
  // Размер страницы
  int32 page_size = 3;
  // Только непрочитанные
  bool unread_only = 4;
}

// Ответ истории уведомлений
message GetUserNotificationsResponse {
  // Список уведомлений
  repeated Notification notifications = 1;
  // Информация о пагинации
  common.v1.Pagination pagination = 2;
}

// Запрос отметки как прочитанное
message MarkAsReadRequest {
  // ID уведомления
  string notification_id = 1;
}

// ─────────────────────────────────────────────────────────────────────────────
// Типы уведомлений
// ─────────────────────────────────────────────────────────────────────────────
enum NotificationType {
  // Неизвестный тип
  NOTIFICATION_TYPE_UNSPECIFIED = 0;
  // Заказ создан
  NOTIFICATION_TYPE_ORDER_CREATED = 1;
  // Заказ подтверждён
  NOTIFICATION_TYPE_ORDER_CONFIRMED = 2;
  // Заказ отправлен
  NOTIFICATION_TYPE_ORDER_SHIPPED = 3;
  // Заказ доставлен
  NOTIFICATION_TYPE_ORDER_DELIVERED = 4;
  // Заказ отменён
  NOTIFICATION_TYPE_ORDER_CANCELLED = 5;
  // Платёж успешен
  NOTIFICATION_TYPE_PAYMENT_SUCCESS = 6;
  // Платёж не удался
  NOTIFICATION_TYPE_PAYMENT_FAILED = 7;
  // Возврат средств
  NOTIFICATION_TYPE_REFUND = 8;
  // Промоакция
  NOTIFICATION_TYPE_PROMOTION = 9;
}

// ─────────────────────────────────────────────────────────────────────────────
// Сущность Notification
// ─────────────────────────────────────────────────────────────────────────────
message Notification {
  // ID уведомления
  string id = 1;
  // ID пользователя
  string user_id = 2;
  // Тип уведомления
  NotificationType type = 3;
  // Заголовок
  string title = 4;
  // Текст уведомления
  string body = 5;
  // Прочитано ли
  bool is_read = 6;
  // Связанный ID заказа
  string order_id = 7;
  // Дополнительные данные (JSON)
  string metadata = 8;
  // Время создания
  string created_at = 9;
}